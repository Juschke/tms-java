version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: translation-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: translation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
