spring.application.name=translation-management

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/translation_db
spring.datasource.username=postgres
spring.datasource.password=postgres_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Vaadin Config
vaadin.productionMode=false

# File Upload Settings (max 50MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Custom storage paths
app.storage.local-dir=./storage

# Debug Spring Security to troubleshoot redirect loops
logging.level.org.springframework.security=DEBUG
